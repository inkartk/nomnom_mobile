services:
  postgres:
    image: postgres:16-alpine
    container_name: nomnom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nomnom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nomnom"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomnom-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nomnom?schema=public
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
