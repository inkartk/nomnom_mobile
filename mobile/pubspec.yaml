name: nomnom_mobile
description: "NomNom - Ingredient-based Recipe Generator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0
  injectable: ^2.4.4
  auto_route: ^7.9.2
  dio: ^5.7.0
  retrofit: ^4.1.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  talker_flutter: ^4.6.4
  talker_bloc_logger: ^4.6.4
  flutter_secure_storage: ^9.2.0
  talker_dio_logger: ^4.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  auto_route_generator: ^7.3.2
  retrofit_generator: ^8.2.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - lib/localization/
